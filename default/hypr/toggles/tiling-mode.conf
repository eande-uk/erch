# E&E UK — Vim mode: h/j/k/l replaces arrows for all directional operations
# Part of the eande-uk/erch omarchy fork.
# Activated via: omarchy hyprland toggle tiling-mode

# ── 1. Migrate displaced normal-mode functions (before unbinding) ──
unbind = SUPER, J
bindd = SUPER CTRL, J, Toggle window split, layoutmsg, togglesplit
unbind = SUPER, K
bindd = SUPER SHIFT, K, Show key bindings, exec, omarchy-menu-keybindings
unbind = SUPER, L
bindd = SUPER ALT, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle

# ── 2. Unbind all arrow-directional bindings ──
# Focus movement
unbind = SUPER, LEFT
unbind = SUPER, RIGHT
unbind = SUPER, UP
unbind = SUPER, DOWN
# Window swap
unbind = SUPER SHIFT, LEFT
unbind = SUPER SHIFT, RIGHT
unbind = SUPER SHIFT, UP
unbind = SUPER SHIFT, DOWN
# Group navigation
unbind = SUPER ALT, LEFT
unbind = SUPER ALT, RIGHT
unbind = SUPER ALT, UP
unbind = SUPER ALT, DOWN
# Move workspace to monitor
unbind = SUPER SHIFT ALT, LEFT
unbind = SUPER SHIFT ALT, RIGHT
unbind = SUPER SHIFT ALT, UP
unbind = SUPER SHIFT ALT, DOWN
# Group window focus
unbind = SUPER CTRL, LEFT
unbind = SUPER CTRL, RIGHT

# ── 3. Bind vim directional keys ──
# Focus movement
bindd = SUPER, h, Focus left, movefocus, l
bindd = SUPER, l, Focus right, movefocus, r
bindd = SUPER, k, Focus up, movefocus, u
bindd = SUPER, j, Focus down, movefocus, d
# Window swap
bindd = SUPER SHIFT, h, Swap left, swapwindow, l
bindd = SUPER SHIFT, l, Swap right, swapwindow, r
bindd = SUPER SHIFT, k, Swap up, swapwindow, u
bindd = SUPER SHIFT, j, Swap down, swapwindow, d
# Group navigation
bindd = SUPER ALT, h, Group left, moveintogroup, l
bindd = SUPER ALT, l, Group right, moveintogroup, r
bindd = SUPER ALT, k, Group up, moveintogroup, u
bindd = SUPER ALT, j, Group down, moveintogroup, d
# Move workspace to monitor
bindd = SUPER SHIFT ALT, h, Move ws left, movecurrentworkspacetomonitor, l
bindd = SUPER SHIFT ALT, l, Move ws right, movecurrentworkspacetomonitor, r
bindd = SUPER SHIFT ALT, k, Move ws up, movecurrentworkspacetomonitor, u
bindd = SUPER SHIFT ALT, j, Move ws down, movecurrentworkspacetomonitor, d
# Group window focus (left/right only)
bindd = SUPER CTRL, h, Group prev, changegroupactive, b
bindd = SUPER CTRL, l, Group next, changegroupactive, f
