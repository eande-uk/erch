name: Feature request
description: Suggest an idea
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What doesn't work well or what's missing?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you solve it?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else have you considered?
