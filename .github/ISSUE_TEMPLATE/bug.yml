name: Bug
description: Report a bug
labels: [bug]
body:
  - type: input
    id: system
    attributes:
      label: System details
      placeholder: e.g. AMD 9950X, NVIDIA 5090, erch master
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run erch-xxx
        2. See error
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output (or run erch-upload-log)
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Validation
      options:
        - label: I have searched existing issues
          required: true
        - label: I am running the latest master
          required: false
